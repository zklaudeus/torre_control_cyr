services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Define POSTGRES_PASSWORD en el archivo .env}
      POSTGRES_DB: ${POSTGRES_DB:-torre_control_cyr}
      TZ: ${TZ:-America/Santiago}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    networks:
      - torre_network
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?Define POSTGRES_PASSWORD en el archivo .env}@db:5432/${POSTGRES_DB:-torre_control_cyr}
      APP_NAME: torre_control_cyr
      APP_ENV: production
      FRONTEND_URL: ${FRONTEND_URL:?Define FRONTEND_URL en el archivo .env}
      SECRET_KEY: ${SECRET_KEY:?Define SECRET_KEY en el archivo .env}
      TZ: ${TZ:-America/Santiago}
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import json,urllib.request; data=json.load(urllib.request.urlopen('http://localhost:8000/api/health/db', timeout=5)); assert data['status']=='ok'"]
      interval: 10s
      timeout: 6s
      retries: 12
      start_period: 20s
    networks:
      - torre_network
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ""
    restart: unless-stopped
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/health"]
      interval: 10s
      timeout: 5s
      retries: 6
    networks:
      - torre_network
    logging:
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:

networks:
  torre_network:
    driver: bridge
