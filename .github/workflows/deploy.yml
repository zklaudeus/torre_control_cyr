name: 🚀 Deploy a VPS

on:
  push:
    branches:
      - main
      - feature/rendimiento-tecnico-reglas-negocio   # rama actual
  workflow_dispatch:   # permite ejecutarlo manualmente desde GitHub

jobs:
  deploy:
    name: Deploy a eisesa.cloud
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: ✅ Checkout código
        uses: actions/checkout@v4

      - name: 📦 Copiar archivos al VPS via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          # Si usas clave SSH en lugar de contraseña, usa:
          # key: ${{ secrets.VPS_SSH_KEY }}
          source: "."
          target: ${{ secrets.VPS_PROJECT_PATH }}
          overwrite: true

      - name: 🐳 Rebuild y restart Docker en el VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          # key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.VPS_PROJECT_PATH }}

            echo "==> Rebuild frontend..."
            docker compose build --no-cache frontend

            echo "==> Rebuild backend..."
            docker compose build --no-cache backend

            echo "==> Reiniciando servicios con nuevas imagenes..."
            docker compose up -d --no-deps backend frontend

            echo "==> Esperando que el backend arranque..."
            sleep 5

            echo "==> [Hotfix] Stamping revision e88cd9c1e280 si la tabla ya existe..."
            docker compose exec -T backend python - <<'PYEOF'
import os, sys
from sqlalchemy import create_engine, inspect, text

db_url = os.environ.get("DATABASE_URL", "")
if not db_url:
    print("No DATABASE_URL found, skipping stamp check.")
    sys.exit(0)

engine = create_engine(db_url)
with engine.connect() as conn:
    tables = inspect(engine).get_table_names()
    row = conn.execute(
        text("SELECT version_num FROM alembic_version WHERE version_num = 'e88cd9c1e280'")
    ).fetchone()
    if 'rendimiento_tecnico_recomendaciones' in tables and row is None:
        conn.execute(text("INSERT INTO alembic_version (version_num) VALUES ('e88cd9c1e280')"))
        conn.commit()
        print("✅ Stamped e88cd9c1e280 — table existía, revisión registrada.")
    else:
        print("✔ Sin acción: tabla no existe aún, o revisión ya estaba registrada.")
PYEOF

            echo "==> Ejecutando migraciones de BD..."
            docker compose exec -T backend alembic upgrade head

            echo "==> Verificando estado..."
            docker compose ps

            echo "✅ Deploy completado."
